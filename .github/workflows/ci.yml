name: CI Pipeline

# ── Trigger: runs on every push and pull request to main ──────────────────────
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:

      # Step 1 - Checkout the code from GitHub
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 - Set up Python 3.10
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Step 3 - Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4 - Check all modules import correctly
      - name: Check imports
        run: |
          python -c "from src.components.data_ingestion import DataIngestion"
          python -c "from src.components.data_transformation import DataTransformation"
          python -c "from src.components.model_trainer import ModelTrainer"
          python -c "from src.pipeline.training_pipeline import TrainingPipeline"
          python -c "from src.pipeline.prediction_pipeline import PredictionPipeline"
          echo "All imports successful"

      # Step 5 - Run the training pipeline
      - name: Run training pipeline
        run: python -m src.pipeline.training_pipeline

      # Step 6 - Verify model.pkl was created
      - name: Verify model artifact
        run: |
          if [ -f "artifacts/model.pkl" ]; then
            echo "model.pkl created successfully"
          else
            echo "model.pkl NOT found — training failed"
            exit 1
          fi

      # Step 7 - Verify FastAPI app loads correctly
      - name: Check FastAPI app
        run: python -c "from app import app; print('FastAPI app loaded successfully')"

