name: CI/CD Pipeline — Insurance Premium Prediction

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'docs/**'
      - '*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'docs/**'
      - '*.md'

jobs:

  # ── CI Job ───────────────────────────────────────────────────────────────────
  continuous-integration:
    name: CI — Build and Test
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check all module imports
        run: |
          python -c "from src.components.data_ingestion import DataIngestion"
          python -c "from src.components.data_transformation import DataTransformation"
          python -c "from src.components.model_trainer import ModelTrainer"
          python -c "from src.pipeline.training_pipeline import TrainingPipeline"
          python -c "from src.pipeline.prediction_pipeline import PredictionPipeline"
          echo "All imports successful"

      - name: Run training pipeline
        run: python -m src.pipeline.training_pipeline

      - name: Verify model.pkl generated
        run: |
          if [ -f "artifacts/model.pkl" ]; then
            echo "model.pkl created successfully"
          else
            echo "model.pkl NOT found — training failed"
            exit 1
          fi

      - name: Check FastAPI app loads
        run: python -c "from app import app; print('FastAPI app loaded successfully')"

  # ── CD Job ───────────────────────────────────────────────────────────────────
  continuous-deployment:
    name: CD — Deploy to Render
    runs-on: ubuntu-latest
    needs: continuous-integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:

      - name: Deploy Backend to Render
        run: |
          curl -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"
          echo "Backend deployment triggered"

      - name: Deploy Frontend to Render
        run: |
          curl -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"
          echo "Frontend deployment triggered"

